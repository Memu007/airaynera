<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="300" fill="#f8f9fa"/>
  <text x="300" y="40" font-family="Arial" font-size="24" text-anchor="middle" fill="#4a9d95">Equipo AIRA</text>
  
  <!-- Círculos principales en la fila superior -->
  <g transform="translate(300, 150)">
    <!-- Círculo central -->
    <circle cx="0" cy="0" r="50" fill="#4a9d95"/>
    <text x="0" y="10" font-family="Arial" font-size="24" text-anchor="middle" fill="white">A</text>
    
    <!-- Círculo izquierdo -->
    <circle cx="-100" cy="0" r="50" fill="#5fb3ac"/>
    <text x="-100" y="10" font-family="Arial" font-size="24" text-anchor="middle" fill="white">I</text>
    
    <!-- Círculo derecho -->
    <circle cx="100" cy="0" r="50" fill="#5fb3ac"/>
    <text x="100" y="10" font-family="Arial" font-size="24" text-anchor="middle" fill="white">R</text>
  </g>
  
  <!-- Círculos en la fila inferior -->
  <g transform="translate(250, 230)">
    <circle cx="0" cy="0" r="40" fill="#6bc1b9"/>
    <text x="0" y="10" font-family="Arial" font-size="20" text-anchor="middle" fill="white">A</text>
  </g>
  
  <g transform="translate(350, 230)">
    <circle cx="0" cy="0" r="40" fill="#6bc1b9"/>
    <text x="0" y="10" font-family="Arial" font-size="20" text-anchor="middle" fill="white">+</text>
  </g>
  
  <!-- Texto debajo -->
  <text x="300" y="290" font-family="Arial" font-size="14" text-anchor="middle" fill="#6c757d">Nuestro equipo en Buenos Aires, Argentina</text>
</svg>
