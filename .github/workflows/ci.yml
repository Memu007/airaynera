name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  functional:
    name: Functional baseline
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run functional tests
        run: npm test

      - name: Exercise production runtime supervisor
        run: npm run test:runtime-supervisor

      - name: Check JavaScript syntax
        run: npm run build

      - name: Check UI contract
        run: npm run lint
