name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci
      - name: Security audit (fail on high)
        run: npm audit --audit-level=high
      - run: npm run lint --if-present
      - run: npx jest --config jest.config.demo.js
      - name: Run Cypress smoke (if present)
        uses: cypress-io/github-action@v6
        with:
          start: node server-demo-funcional.js
          wait-on: 'http://localhost:3000/health'
          spec: cypress/e2e/demo-smoke.cy.js
        continue-on-error: true
      - run: npm run build --if-present


