name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  functional:
    name: Functional baseline
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run functional tests
        run: npm test

      - name: Exercise production runtime supervisor
        run: npm run test:runtime-supervisor

      - name: Check JavaScript syntax
        run: npm run build

      - name: Check UI contract
        run: npm run lint

  browser:
    name: Session edit browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ubuntu-latest ships Google Chrome; the runner also detects it via the
      # 'chrome' channel, but pinning the path keeps the run deterministic.
      - name: Locate Chrome
        run: echo "PLAYWRIGHT_CHROMIUM_PATH=$(which google-chrome || which google-chrome-stable)" >> "$GITHUB_ENV"

      - name: Run session edit browser tests
        run: npm run test:session-edit:browser

      - name: Run mobile recording browser tests
        run: npm run test:mobile-recording:browser
