name: SAST Semgrep

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci
          generateSarif: true
      - name: Gate on high severity findings
        if: always()
        run: |
          if [ -f semgrep.sarif ]; then
            if grep -q '"level": "error"' semgrep.sarif; then
              echo "High severity findings detected"; exit 1; fi
          fi
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
