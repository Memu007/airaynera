name: Secret Scanning (trufflehog)

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@v3.80.3
        with:
          path: .
          base: ''
          head: ''
          extra_args: --only-verified --fail
