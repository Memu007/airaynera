name: SCA npm audit

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: npm audit (gate high=0)
        run: npm audit --audit-level=high
