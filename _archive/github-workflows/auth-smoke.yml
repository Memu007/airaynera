name: Auth Smoke

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Run auth smoke
        env:
          REQUIRE_AUTH: 'true'
          JWT_SECRET: 'test-secret-ci'
        run: node scripts/staging-auth-smoke.js


