services:
  - type: web
    name: aira-medical
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_KEY
        generateValue: true
      - key: WHATSAPP_ADAPTER
        value: fake
    healthCheckPath: /health
    disk:
      name: aira-data
      mountPath: /app/data
      sizeGB: 1
