services:
  - type: web
    name: aira-medical
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_KEY
        generateValue: true
      - key: WHATSAPP_ADAPTER
        value: fake
      - key: AUDIO_TRANSCRIBER
        value: fake
      - key: NOTE_CLEANER
        value: fake
      - key: APP_TIME_ZONE
        value: America/Argentina/Buenos_Aires
      - key: AUDIO_PROCESSING_LEASE_MS
        value: 300000
    healthCheckPath: /health
    disk:
      name: aira-data
      mountPath: /app/data
      sizeGB: 1
